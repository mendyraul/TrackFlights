name: CI

on:
  pull_request:
    branches: [dev]
    paths:
      - "apps/**"
      - "packages/**"
      - "package*.json"
      - "tsconfig*.json"
      - "apps/ingestor/**"
      - ".github/workflows/ci.yml"
  push:
    branches: [dev]
    paths:
      - "apps/**"
      - "packages/**"
      - "package*.json"
      - "tsconfig*.json"
      - "apps/ingestor/**"
      - ".github/workflows/ci.yml"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.filter.outputs.web }}
      ingestor: ${{ steps.filter.outputs.ingestor }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect changed areas
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            web:
              - 'apps/web/**'
              - 'packages/**'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig.json'
            ingestor:
              - 'apps/ingestor/**'

  web-lint:
    name: web / lint
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.web == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install deps
        run: npm ci
      - name: Lint
        run: npm run lint

  web-typecheck:
    name: web / typecheck
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.web == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install deps
        run: npm ci
      - name: Type-check
        run: npm run type-check

  web-build:
    name: web / build
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.web == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install deps
        run: npm ci
      - name: Build
        run: npm run build

  ingestor-tests:
    name: ingestor / tests
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.ingestor == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'apps/ingestor/requirements.txt'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r apps/ingestor/requirements.txt
          pip install pytest
      - name: Test
        env:
          SUPABASE_URL: https://example.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ci-placeholder-key
        run: pytest apps/ingestor/tests -q

  no-op:
    name: no-op (non-app change)
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.web != 'true' && needs.changes.outputs.ingestor != 'true'
    steps:
      - run: echo "No app changes detected; CI jobs skipped."

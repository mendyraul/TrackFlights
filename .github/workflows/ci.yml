name: Phase 1 Baseline

on:
  pull_request:
    branches: [dev]
  push:
    branches: [dev, main]

concurrency:
  group: phase1-baseline-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  baseline:
    name: Phase 1 Baseline Check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run baseline gate
        run: npm run ci:baseline

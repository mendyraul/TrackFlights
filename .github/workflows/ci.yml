name: CI

on:
  pull_request:
  push:
    branches: [dev, main]

jobs:
  web-checks:
    name: Web lint, type-check, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install deps (workspace)
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Type-check
        run: npm run type-check
      - name: Build
        run: npm run build

  ingestor-tests:
    name: Ingestor pytest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/ingestor
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run tests
        run: pytest -q

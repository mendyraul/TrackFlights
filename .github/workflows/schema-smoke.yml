name: Schema Smoke

on:
  pull_request:
    branches: [main, dev]
    paths:
      - "supabase/migrations/**"
      - "scripts/smoke-supabase-schema.sh"
      - "package.json"
      - ".github/workflows/schema-smoke.yml"
  workflow_dispatch:

jobs:
  schema-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install deps
        run: npm ci
      - name: Run schema smoke
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: npm run smoke:schema

name: Security Gates

on:
  pull_request:
  push:
    branches: [dev, main]

jobs:
  node-audit:
    name: Web production dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Generate lockfile for audit
        run: npm install --package-lock-only --ignore-scripts
      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=critical

  python-audit:
    name: Ingestor Python dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: apps/ingestor
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit
      - name: Audit Python dependencies from requirements lockset
        run: pip-audit --strict -r requirements.txt

name: Security Gates

on:
  pull_request:
  push:
    branches: [dev, main]

jobs:
  changed-paths:
    name: Detect security-relevant path changes
    runs-on: ubuntu-latest
    outputs:
      web_changed: ${{ steps.filter.outputs.web }}
      ingestor_changed: ${{ steps.filter.outputs.ingestor }}
    steps:
      - uses: actions/checkout@v4
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            web:
              - 'apps/web/**'
              - '.github/workflows/security-gates.yml'
            ingestor:
              - 'apps/ingestor/**'
              - '.github/workflows/security-gates.yml'

  node-audit:
    name: Web production dependency audit
    needs: changed-paths
    if: needs.changed-paths.outputs.web_changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Generate lockfile for audit
        run: npm install --package-lock-only --ignore-scripts
      - name: Audit production dependencies
        # Intentionally keep critical threshold here so docs-only readiness PRs are not blocked by known upstream highs;
        # stricter high-severity tracking continues via the workspace script (`npm run security:audit:web`) and issue backlog.
        run: npm audit --omit=dev --audit-level=critical

  python-audit:
    name: Ingestor Python dependency audit
    needs: changed-paths
    if: needs.changed-paths.outputs.ingestor_changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: apps/ingestor
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit
      - name: Audit Python dependencies from requirements lockset
        run: pip-audit --strict -r requirements.txt

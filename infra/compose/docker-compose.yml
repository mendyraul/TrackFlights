version: "3.8"

services:
  # Local Supabase (Postgres + API)
  supabase-db:
    image: supabase/postgres:15.1.1.41
    ports:
      - "54322:5432"
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - supabase-db-data:/var/lib/postgresql/data
      - ../../supabase/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Next.js frontend (dev mode)
  web:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.web
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_SUPABASE_URL: http://localhost:54321
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-your-anon-key}
    depends_on:
      supabase-db:
        condition: service_healthy

  # Python ingestor
  ingestor:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.ingestor
    environment:
      SUPABASE_URL: http://localhost:54321
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-your-service-role-key}
      FLIGHT_API_KEY: ${FLIGHT_API_KEY:-your-api-key}
      FLIGHT_API_BASE_URL: ${FLIGHT_API_BASE_URL:-https://api.aviationstack.com/v1}
      POLL_INTERVAL_SECONDS: "30"
    depends_on:
      supabase-db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  supabase-db-data:
